appId: com.livresolucoes.homelab-manager
productName: Homelab Manager
npmRebuild: true
files:
  - out/**/*
  - node_modules/**/*
asarUnpack:
  - "**/node_modules/better-sqlite3/**"
directories:
  output: dist-electron
publish:
  provider: github
  owner: rafarvns
  repo: homelab-manager
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
win:
  target: [nsis, portable]
  icon: build/icon.ico
mac:
  target: [dmg]
  icon: build/icon.icns
linux:
  target: [AppImage, deb]
  icon: build/icon.png

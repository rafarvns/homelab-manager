name: Build and Release

on:
  push:
    branches:
      - main

# Prevent overlapping release runs
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Lê a versão do package.json e cria a tag
  # ─────────────────────────────────────────────────────────────────────────────
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
      tag_name: ${{ steps.read.outputs.tag_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Read version from package.json
        id: read
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=$version"       >> "$GITHUB_OUTPUT"
          echo "tag_name=v$version"     >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Build nos três sistemas operacionais
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build / ${{ matrix.artifact }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_cmd: build:win
            artifact: windows
          - os: macos-latest
            build_cmd: build:mac
            artifact: macos
          - os: ubuntu-latest
            build_cmd: build:linux
            artifact: linux

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build (${{ matrix.artifact }})
        run: pnpm ${{ matrix.build_cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.artifact }}
          path: dist-electron/
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Publica o GitHub Release com os artefatos de todas as plataformas
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: false

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          name: Homelab Manager ${{ needs.prepare.outputs.tag_name }}
          generate_release_notes: true
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
